<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Certifications | Kennie Angelo R. Estrellon</title>

    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='images/ken.jpg') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles/certifications.css') }}">

    <script src="{{ url_for('static', filename='js/certifications.js') }}" defer></script>

</head>

<body>

    <div class="cert-page">
        <div class="cert-page-header">
            <a href="{{ url_for('home') }}" class="back-link">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="cert-page-title">All Certifications</h1>
        </div>

        <div class="certifications">
            <div class="cert-list">

                <div class="cert-item" data-image="{{ url_for('static', filename='images/ITS_certificate.jpg') }}"
                    onclick="openModal(this.dataset.image)">
                    <div class="cert-details">
                        <h3>IT Specialist Examination</h3>
                        <div class="cert-meta">
                            <span>Certiport</span>
                            <span class="cert-year">2024</span>
                        </div>
                    </div>
                </div>

                <div class="cert-item" onclick="openModal('Hour of Code Certificate.jpg')">
                    <div class="cert-details">
                        <h3>The Hour of Code</h3>
                        <div class="cert-meta">
                            <span>Code.org</span>
                            <span class="cert-year">2024</span>
                        </div>
                    </div>
                </div>

                <div class="cert-item" onclick="openModal('Gateway to Quantum Computing.jpg')">
                    <div class="cert-details">
                        <h3>Gateway to Quantum Computing</h3>
                        <div class="cert-meta">
                            <span>Exploring the Basics</span>
                            <span class="cert-year">2024</span>
                        </div>
                    </div>
                </div>

                <div class="cert-item" onclick="openModal('AI Fluency.jpg')">
                    <div class="cert-details">
                        <h3>AI Fluency</h3>
                        <div class="cert-meta">
                            <span>Microsoft Learn</span>
                            <span class="cert-year">2026</span>
                        </div>
                    </div>
                </div>

                <div class="cert-item" onclick="openModal('AI Fluency.jpg')">
                    <div class="cert-details">
                        <h3>Create a canvas app in Power Apps</h3>
                        <div class="cert-meta">
                            <span>Microsoft Learn</span>
                            <span class="cert-year">2026</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Image Modal -->
    <div id="imageModal" class="modal">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

</body>

</html>
